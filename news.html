<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>お知らせ | PO・TORO</title>
  <meta name="description" content="PO・TOROのお知らせ一覧" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#f6b7d2" />
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    .ticker{background:#fff;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,255,255,.7)}
    .ticker ul{list-style:none;margin:0;padding:0}
    .ticker li{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-bottom:1px solid #eee;line-height:1.55}
    .ticker li:last-child{border-bottom:none}
    .label{display:inline-block;padding:.18em .62em;border-radius:999px;font-size:.75rem;font-weight:1000;color:#fff;background:#ff72b4;white-space:nowrap}
    @media (prefers-color-scheme: dark){
      .ticker{background:rgba(29,31,34,.92);border-color:rgba(255,255,255,.12)}
      .ticker li{border-bottom-color:#2b2d31}
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">本文へスキップ</a>

  <header>
    <nav class="nav container" aria-label="Main">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true"><span>PT</span></div>
        <div class="brand-title">
          <div class="en">concept cafe <span style="letter-spacing:.12em">PO・TORO</span></div>
          <div class="jp">お知らせ</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html">トップ</a>
        <a href="events.html">イベント</a>
        <a href="goods.html">グッズ</a>
        <a href="games.html">ゲーム/診断</a>
      </div>
      <button class="hamburger" id="btnMenu" aria-label="メニューを開く" aria-controls="drawer" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </nav>

    <div class="drawer" id="drawer" aria-hidden="true" aria-label="サイドメニュー">
      <div class="head">
        <div style="font-weight:1000">メニュー</div>
        <button id="btnClose" aria-label="閉じる" style="background:#f6f6f6;border:none;border-radius:12px;padding:8px 10px;font-weight:1000;cursor:pointer">✕</button>
      </div>
      <a href="index.html">トップ</a>
      <a href="events.html">イベント</a>
      <a href="goods.html">グッズ</a>
      <a href="games.html">ゲーム/診断</a>
    </div>
  </header>

  <main id="main">
    <section>
      <div class="container reveal">
        <h1 class="sec-title">🗞️ お知らせ一覧</h1>
        <div class="ticker">
          <ul id="newsList"></ul>
        </div>
        <div class="mt-12">
          <a class="btn btn-ghost" href="index.html">← トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container foot reveal">
      <div>
        <h4>concept cafe PO・TORO</h4>
        <div class="copyright">© <span id="year"></span> PO・TORO / concept cafe. All rights reserved.</div>
      </div>
      <div></div><div></div>
    </div>
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/core.js"></script>
  <script src="assets/js/news.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async ()=>{
      PortalCore.setupReveal();
      PortalCore.setupDrawer();
      PortalCore.setupCommonFooterYear();

      const items = await PortalNews.loadNews();
      PortalNews.renderNewsList('newsList', items);
    });
  </script>
</body>
</html>
