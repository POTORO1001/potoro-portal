<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PO・TORO 公式ポータル</title>
  <meta name="description" content="concept cafe PO・TORO（ポ・トロ）の総合ポータル。最新イベント、メイドさん紹介、アクセス、各種コンテンツへの入口をひとまとめ。" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#f6b7d2" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
  <link rel="canonical" href="https://potoro1001.github.io/potoro-portal/" />

  <!--
    ポトロポータル｜予約導線1本化 Ver1.8（iPhoneヒーローロゴ上配置）
    - Ver1.7（理念統合版）をベースに、以下を更新：
      ① iPhone表示（<=768px）でヒーロー右側ロゴ（hero-visual）を“上”に移動
         → .hero .wrap を grid から flex(column) に切替
         → .hero-visual を order:-1 で最上部へ

    ★ 追加修正（今回）
      - フッター電話番号下の文言（.tag）が iPhone向け強制CSSで #444 に上書きされ、濃い背景で見えなくなる問題を修正
      - 電話ブロックを .foot-call として例外扱い（常に白系で可読）

    ★ Ver1.9（今回の実装）
      ⑤ 料金ブロックに「滞在イメージ（目安）」を追加（60/90/120分）
      ⑧ 初めての方へモーダルに「来店の流れ」「支払い/撮影（OKなこと中心）」を追加

    ★ Ver1.9.1（今回のバグ修正）
      - renderTodayMaids() 周辺の参照エラー（stEl未定義）でJSが停止し、動画後に操作不能になる問題を修正
      - CSS内のはみ出し行を除去

    ★ Ver1.10（今回の追加）
      - X内ブラウザ（in-app）で開いた場合に「ブラウザで開く / このまま見る」を案内できるモーダルを追加
      - 「URLをコピー」「共有（対応端末）」ボタンで外部ブラウザへ誘導（※サイト側から“強制でSafari/Chrome”は不可のため）
      - 次回以降表示しない（localStorage）対応、?open=browser で案内スキップ対応

    ★ Ver1.10.1（今回の追加）
      - ヒーロー下に「麻雀募集バナー」を追加（募集部屋があるときだけ表示）
  -->

  <meta property="og:url" content="https://potoro1001.github.io/potoro-portal/" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PO・TORO 公式ポータル" />
  <meta name="twitter:description" content="concept cafe PO・TORO（ポ・トロ）の最新情報とリンク集。" />
  <meta name="twitter:image" content="https://potoro1001.github.io/potoro-portal/img/ogp.jpg" />

  <style>
    :root{
      --bg:#fff7fb;
      --card:#ffffffcc;
      --card-solid:#ffffff;
      --ink:#2b2b2b;
      --sub:#666;
      --accent:#ff79a6;
      --accent2:#7fc9ff;
      --ring:#ffd7e6;
      --shadow:0 12px 30px rgba(0,0,0,.10);
      --shadow2:0 18px 42px rgba(0,0,0,.14);
      --radius:18px;

      --bg-angle:135deg;
      --bg-a:#f6b7d2;
      --bg-b:#a9d6f7;

      --ease:cubic-bezier(.2,.8,.2,1);
    }

    @supports (color: color(srgb 1 1 1)){
      :root{
        --bg-a: color(srgb 0.9647 0.7176 0.8235);
        --bg-b: color(srgb 0.6627 0.8392 0.9686);
      }
      .btn-primary{
        background:linear-gradient(135deg,color(srgb 1 0.5059 0.7529),color(srgb 0.5569 0.8235 1));
      }
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;height:100%;
      font-family:"-apple-system","BlinkMacSystemFont","Hiragino Kaku Gothic ProN","Noto Sans JP",Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;
      color:var(--ink);
      background:linear-gradient(var(--bg-angle),var(--bg-a),var(--bg-b));
      background-attachment:fixed;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    }

    body::before{
      content:"";
      position:fixed; inset:-20%;
      pointer-events:none;
      background:
        radial-gradient(600px 420px at 15% 25%, rgba(255,255,255,.55), transparent 60%),
        radial-gradient(700px 520px at 85% 70%, rgba(255,255,255,.45), transparent 62%),
        radial-gradient(420px 320px at 55% 10%, rgba(255,250,252,.55), transparent 65%);
      filter: blur(2px);
      opacity:.75;
      z-index:-1;
    }

    a{color:#0b69d5;text-decoration:none}
    a:hover{text-decoration:underline}
    img{max-width:100%;height:auto;display:block}
    .container{width:min(1100px,92vw);margin:0 auto}

    header{
      position:sticky;top:0;z-index:50;
      backdrop-filter:saturate(140%) blur(10px);
      background:rgba(255,255,255,.84);
      box-shadow:0 2px 12px rgba(0,0,0,.08)
    }
    .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-logo{
      width:40px;height:40px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #fff, #ffe2ee 60%, #ffd3ea 100%);
      display:grid;place-items:center;box-shadow:var(--shadow)
    }
    .brand-logo span{font-weight:900;color:#ff5ea8}
    .brand-title{font-weight:900;letter-spacing:.06em}
    .brand-title .en{font-size:1.03rem}
    .brand-title .jp{font-size:.8rem;color:#666;font-weight:800}

    .nav-links{display:flex;gap:12px;align-items:center}
    .nav-links a{
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.98);
      box-shadow:0 4px 12px rgba(0,0,0,.08);
      font-size:.98rem;font-weight:900;color:#222;
      border:1px solid #eaeaea;
      letter-spacing:.02em;
      outline:none;
      transition:transform .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease), color .18s var(--ease);
      text-decoration:none;
    }
    .nav-links a:hover{
      background:#111;color:#fff;text-decoration:none;
      transform:translateY(-1px);
      box-shadow:0 10px 18px rgba(0,0,0,.18)
    }
    .nav-links a:focus-visible{outline:2px solid #0b69d5;outline-offset:2px}

    .hamburger{
      display:none;background:#fff;border:none;border-radius:12px;padding:9px;
      box-shadow:0 4px 12px rgba(0,0,0,.08)
    }
    .hamburger svg{width:22px;height:22px}

    @media (max-width:880px){
      .nav-links{display:none}
      .hamburger{display:inline-grid}
      .drawer{
        position:fixed;inset:0 0 0 auto;width:min(84vw,360px);
        background:#fff;box-shadow:-20px 0 40px rgba(0,0,0,.18);
        transform:translateX(100%);transition:transform .28s var(--ease);
        z-index:60;display:flex;flex-direction:column
      }
      .drawer.open{transform:translateX(0)}
      .drawer .head{display:flex;align-items:center;justify-content:space-between;padding:16px}
      .drawer a{padding:16px 20px;border-bottom:1px solid #eee;font-size:1.05rem;font-weight:900;color:#222;letter-spacing:.02em;text-decoration:none}
      .drawer a:hover{background:#fafafa}
    }

    .hero{position:relative;isolation:isolate}
    .hero .wrap{
      display:grid;grid-template-columns:1.1fr .9fr;
      gap:22px;align-items:center;
      padding:44px 0 14px;
    }

    /* =========================
       ★ Ver1.8：iPhoneでロゴ（hero-visual）を上へ
       ========================= */
    @media (max-width:768px){
      .hero .wrap{
        display:flex;
        flex-direction:column;
        gap:16px;
        padding:26px 0 12px;
      }
      .hero-visual{
        order:-1;
        width:100%;
        max-width:520px;
        margin:0 auto;
      }
      .hero .wrap > .reveal{
        order:0;
        width:100%;
      }
    }

    .badge{
      display:inline-flex;gap:8px;align-items:center;
      background:#fff;border-radius:999px;
      padding:7px 12px;box-shadow:var(--shadow);
      font-size:.86rem;font-weight:900;
      border:1px solid rgba(255,121,166,.25);
    }
    .headline{
      font-size:clamp(1.65rem,4vw,2.75rem);
      line-height:1.12;margin:.55rem 0 .35rem;
      font-weight:1000;letter-spacing:.02em;
    }
    .sub{color:#444;margin:.2rem 0 1rem;line-height:1.7}

    .cta{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 16px;border-radius:14px;
      border:none;font-weight:900;cursor:pointer;
      box-shadow:var(--shadow);
      text-decoration:none;
      transition:transform .18s var(--ease), box-shadow .18s var(--ease), filter .18s var(--ease);
    }
    .btn:hover{transform:translateY(-2px); box-shadow:var(--shadow2); text-decoration:none}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:linear-gradient(135deg,#ff81c0,#8ed2ff);color:#fff}
    .btn-ghost{background:#fff;color:#333;border:1px solid #eee}

    /* ===== 予約導線（ヒーローで主導線を1本化） ===== */
    .today-box{
      margin-top:12px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(255,255,255,.7);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px 12px;
    }
    .today-row{
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;
    }
    .today-left{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      font-weight:1000;
    }
    .today-pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:999px;
      background:linear-gradient(135deg, rgba(255,121,166,.18), rgba(127,201,255,.18));
      border:1px solid rgba(255,121,166,.18);
      color:#333;
      font-size:.86rem;
      white-space:nowrap;
    }
    .today-hours{
      font-variant-numeric:tabular-nums;
      font-weight:1000;
      color:#222;
      font-size:1.02rem;
    }

    /* ★ Ver1.5：本日の出勤メイド */
    .today-maids{
      margin-top:10px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,247,251,.95));
      padding:10px 10px;
    }
    .today-maids-head{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
      font-weight:1000;
      color:#222;
      margin-bottom:8px;
    }
    .maids-pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:999px;
      background:rgba(255,255,255,.95);
      border:1px solid rgba(255,121,166,.18);
      box-shadow:0 6px 14px rgba(0,0,0,.08);
      font-weight:1000;
      color:#222;
      line-height:1.2;
      white-space:nowrap;
    }
    .maids-pill .subtxt{
      font-size:.78rem;
      font-weight:900;
      color:#666;
    }
    .maids-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .maid-name{ font-weight:900; }
    .maid-time{
      color:#ff4fa3;
      font-weight:900;
    }
    .maids-fallback{
      font-weight:900;
      color:#555;
      font-size:.92rem;
    }

    .btn-reserve{
      padding:14px 18px;
      border-radius:16px;
      font-size:1.05rem;
      letter-spacing:.02em;
      box-shadow:0 16px 34px rgba(255, 120, 170, .32);
      border:1px solid rgba(255,255,255,.4);
      width:100%;
      justify-content:center;
    }
    .reserve-stack{display:grid;gap:10px;margin-top:10px}
    .reserve-subactions{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      font-weight:900;
    }
    .reserve-subactions a,
    .reserve-subactions button{
      display:inline-flex;gap:8px;align-items:center;
      padding:9px 12px;border-radius:999px;
      background:rgba(255,255,255,.95);
      border:1px solid rgba(0,0,0,.06);
      box-shadow:0 6px 14px rgba(0,0,0,.08);
      text-decoration:none;color:#222;
      cursor:pointer;
      font-weight:1000;
    }
    .reserve-subactions a:hover,
    .reserve-subactions button:hover{transform:translateY(-1px);text-decoration:none}
    .reserve-note{color:#555;font-size:.86rem;font-weight:900;line-height:1.6}

    /* ★ Ver1.10：外部ブラウザ誘導（小さめ） */
    .mini-open-browser{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-top:10px;
      padding:10px 10px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,247,251,.92));
      border:1px solid rgba(0,0,0,.06);
    }
    .mini-open-browser .txt{
      font-size:.86rem;
      font-weight:1000;
      color:#333;
      line-height:1.5;
    }
    .mini-open-browser .btnline{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }
    .mini-open-browser .sbtn{
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      box-shadow:0 6px 14px rgba(0,0,0,.08);
      font-weight:1000;
      cursor:pointer;
      text-decoration:none;
      color:#222;
    }

    .hero-card{
      background:var(--card);
      backdrop-filter: blur(10px);
      padding:14px;border-radius:14px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.55);
    }

    .hero-visual{
      position:relative;
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow2);
      background:rgba(255,255,255,.6);
      border:1px solid rgba(255,255,255,.7);
    }
    .hero-visual::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(380px 280px at 20% 25%, rgba(255,121,166,.22), transparent 60%),
        radial-gradient(420px 320px at 80% 70%, rgba(127,201,255,.20), transparent 62%);
      pointer-events:none;
    }
    .hero-visual img{
      width:100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display:block;
      transform: scale(1.02);
    }

    .cheki-card{
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      outline:none;
    }
    .cheki-card:focus-visible{
      outline:3px solid rgba(11,105,213,.75);
      outline-offset:3px;
    }

    /* =========================
       ★ Ver1.10.1：麻雀募集バナー（ヒーロー下）
       ========================= */
    .mahjongBanner{
      margin: 10px auto 0;
      padding: 0 16px;
      max-width: 1100px;
    }
    .mahjongBanner__inner{
      display:flex;
      gap:14px;
      align-items:center;
      padding:14px 14px;
      border-radius: var(--radius, 22px);
      background: linear-gradient(135deg, rgba(255,121,166,.14), rgba(127,201,255,.16));
      border: 1px solid rgba(255,121,166,.22);
      box-shadow: var(--shadow, 0 12px 28px rgba(0,0,0,.08));
    }
    .mahjongBanner__icon{
      width:42px;height:42px;
      display:grid;place-items:center;
      border-radius: 14px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(255,121,166,.22);
      font-size:22px;
      flex: 0 0 auto;
    }
    .mahjongBanner__body{flex:1 1 auto; min-width: 0;}
    .mahjongBanner__title{
      font-weight: 1000;
      color: var(--ink, #2b2b2b);
      letter-spacing: .01em;
      line-height: 1.25;
      display:flex;
      gap:8px;
      align-items:baseline;
      flex-wrap:wrap;
    }
    .mahjongBanner__count{
      font-weight: 1000;
      font-size: .92em;
      color: #fff;
      background: var(--accent, #ff79a6);
      padding: 3px 10px;
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(255,121,166,.25);
    }
    .mahjongBanner__list{
      margin-top:6px;
      color: var(--sub, #666);
      font-size: 14px;
      line-height: 1.35;
      display:grid;
      gap:4px;
    }
    .mahjongBanner__list .item{
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mahjongBanner__meta{
      margin-top:6px;
      font-size: 12px;
      color: var(--sub, #666);
      opacity: .9;
    }
    .mahjongBanner__cta{flex:0 0 auto;}
    .mahjongBanner__btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      border-radius: 999px;
      text-decoration:none;
      font-weight: 1000;
      color:#fff;
      background: linear-gradient(135deg, var(--accent, #ff79a6), #ff4ea9);
      box-shadow: 0 12px 22px rgba(255,121,166,.25);
      border: 1px solid rgba(255,255,255,.35);
    }
    .mahjongBanner__btn:hover{filter: brightness(1.03); text-decoration:none;}
    @media (max-width: 520px){
      .mahjongBanner__inner{align-items:flex-start;}
      .mahjongBanner__cta{margin-left:auto;}
      .mahjongBanner__btn{padding:9px 12px;}
    }

    .quick{ padding:10px 0 26px; }
    .quick-grid{
      display:grid; gap:14px;
      grid-template-columns:repeat(4,1fr);
    }
    @media (max-width:1024px){ .quick-grid{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:520px){ .quick-grid{grid-template-columns:1fr} }

    .qcard{
      position:relative;
      background:rgba(255,255,255,.92);
      border-radius:18px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.7);
      overflow:hidden;
      padding:16px;
      min-height:120px;
      display:flex; flex-direction:column; justify-content:space-between; gap:8px;
      transition:transform .18s var(--ease), box-shadow .18s var(--ease);
      text-decoration:none;
      color:inherit;
    }
    .qcard:hover{transform:translateY(-3px); box-shadow:var(--shadow2); text-decoration:none}
    .qcard .top{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .qcard .ico{
      width:42px;height:42px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(135deg, rgba(255,121,166,.18), rgba(127,201,255,.18));
      border:1px solid rgba(255,121,166,.20);
      font-size:20px;
    }
    .qcard h3{margin:0;font-size:1.02rem;font-weight:1000}
    .qcard p{margin:0;color:#555;font-size:.9rem;line-height:1.5}
    .qcard .tag{
      font-size:.78rem;color:#666;font-weight:900;
      display:inline-flex; gap:6px; align-items:center;
    }
    .qcard .tag::before{content:"•"; color:#ff72b4}

    section{padding:34px 0}
    .sec-title{
      font-weight:1000;font-size:1.35rem;margin:0 0 14px 0;
      display:flex;align-items:center;gap:10px;
      letter-spacing:.02em;
    }

    .ticker{background:#fff;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,255,255,.7)}
    .ticker ul{list-style:none;margin:0;padding:0}
    .ticker li{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-bottom:1px solid #eee;line-height:1.55}
    .ticker li:last-child{border-bottom:none}
    .ticker time{font-variant-numeric:tabular-nums;color:#666;min-width:8.2em;font-weight:900}
    .label{display:inline-block;padding:.18em .62em;border-radius:999px;font-size:.75rem;font-weight:1000;color:#fff;background:#ff72b4;white-space:nowrap}

    .grid{display:grid;gap:16px}
    .grid.cols-3{grid-template-columns:repeat(3,1fr)}
    .grid.cols-4{grid-template-columns:repeat(4,1fr)}
    @media (max-width:1024px){.grid.cols-4{grid-template-columns:repeat(3,1fr)}}
    @media (max-width:880px){.grid.cols-4,.grid.cols-3{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:520px){.grid.cols-4,.grid.cols-3{grid-template-columns:1fr}}

    .card{
      background:#fff;border-radius:18px;box-shadow:var(--shadow);
      overflow:hidden;display:flex;flex-direction:column;
      border:1px solid rgba(255,255,255,.7);
      transition:transform .18s var(--ease), box-shadow .18s var(--ease);
    }
    .card:hover{transform:translateY(-3px); box-shadow:var(--shadow2)}
    .card .thumb{aspect-ratio:16/9;background:#f4f4f4;object-fit:cover}
    .card .body{padding:12px 14px}
    .card h3{margin:.2rem 0 .35rem;font-size:1.08rem;font-weight:1000}
    .card p{margin:0;color:#555;font-size:.93rem;line-height:1.55}
    .chip{display:inline-flex;align-items:center;gap:6px;background:#fafafa;border:1px solid #eee;border-radius:999px;padding:4px 8px;font-size:.78rem;font-weight:900;color:#444;margin-top:10px}

    #eventsGrid .card{position:relative}
    #eventsGrid .thumb{aspect-ratio: 16/10}
    .event-overlay{
      position:absolute; left:12px; right:12px; bottom:12px;
      background:rgba(255,255,255,.90);
      border:1px solid rgba(255,255,255,.82);
      border-radius:16px;
      padding:10px 12px;
      box-shadow:0 14px 28px rgba(0,0,0,.14);
      display:flex; flex-direction:column; gap:6px;
    }
    .event-overlay .meta{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px; border-radius:999px;
      font-size:.78rem; font-weight:1000;
      background:linear-gradient(135deg, rgba(255,121,166,.18), rgba(127,201,255,.18));
      border:1px solid rgba(255,121,166,.18);
      color:#333;
      white-space:nowrap;
    }
    .pill.date{background:rgba(255,255,255,.9); border:1px solid #eee; color:#444}
    .event-title{font-weight:1000; font-size:1.05rem; margin:0}
    .event-link{font-weight:1000}
    .event-link a{text-decoration:none}
    .event-link a:hover{text-decoration:underline}

    .featured{ grid-column: span 2; }
    .featured .thumb{aspect-ratio: 21/10}
    @media (max-width:880px){
      .featured{grid-column:auto}
      .featured .thumb{aspect-ratio:16/10}
    }

    .table{
      width:100%;border-collapse:collapse;
      background:#fff;border-radius:14px;
      box-shadow:var(--shadow);overflow:hidden;
      border:1px solid rgba(255,255,255,.7);
    }
    .table th,.table td{padding:12px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}
    .table th{background:#fafafa;font-weight:1000}
    .table tr:last-child td{border-bottom:none}

    footer{padding:28px 0;color:#333}
    .foot{display:grid;gap:16px;grid-template-columns:2fr 1fr 1fr}
    .foot h4{margin:.2rem 0 .6rem;font-weight:1000}
    .sns{display:flex;gap:10px}
    .copyright{margin-top:12px;font-size:.85rem;color:#555}
    @media (max-width:880px){.foot{grid-template-columns:1fr}}

    .tag{font-size:.75rem;color:#666}
    .mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}

    .devlog{
      position:absolute !important;
      width:1px!important;height:1px!important;
      margin:-1px!important;padding:0!important;border:0!important;
      clip:rect(0 0 0 0)!important;clip-path:inset(50%)!important;
      overflow:hidden!important;white-space:nowrap!important;
      opacity:0!important;pointer-events:none!important;
    }

    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;padding:4vw;z-index:100;opacity:0;pointer-events:none;transition:.2s}
    .lightbox.open{opacity:1;pointer-events:auto}
    .lightbox img{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 8px 30px rgba(0,0,0,.5);border-radius:10px}
    .lightbox .close{position:absolute;top:16px;right:16px;background:#fff;border:none;border-radius:999px;font-size:16px;padding:8px 12px;cursor:pointer}

    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:120;opacity:0;pointer-events:none;transition:.2s}
    .modal.open{opacity:1;pointer-events:auto}
    .modal .panel{width:min(880px,92vw);max-height:min(80vh,900px);overflow:auto;background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:18px}
    .modal .panel h2{margin:.4rem 0 0.6rem;font-size:1.3rem;font-weight:1000}
    .modal .close{position:sticky;top:0;margin-left:auto;background:#f6f6f6;border:none;border-radius:999px;padding:8px 12px;cursor:pointer;font-weight:900}
    .modal .body{padding:8px 4px}

    /* 初めての方へ：ミニモーダルの見た目 */
    .mini-grid{display:grid;gap:12px}
    .mini-card{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px 12px;
      background:linear-gradient(180deg, #fff, #fff7fb);
    }
    .mini-card h3{margin:.1rem 0 .5rem;font-size:1.05rem;font-weight:1000}
    .mini-card ul{margin:.3rem 0 0; padding-left:18px; color:#444; line-height:1.65; font-weight:800}
    .mini-kv{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-top:8px;
    }
    .mini-kv .kv{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:999px;
      background:rgba(255,121,166,.12);
      border:1px solid rgba(255,121,166,.18);
      font-weight:1000;color:#333;
      white-space:nowrap;
    }

    /* ★ Ver1.7：理念（長文）を読みやすく */
    .mini-card .policy{
      margin:0;
      color:#444;
      line-height:1.75;
      font-weight:800;
    }
    .mini-card .policy strong{
      font-weight:1000;
      color:#ff4fa3;
    }

    .mini-muted{
      color:#666;
      font-weight:800;
    }

    /* ★ Ver1.10：ブラウザで開く案内モーダル */
    .browser-grid{display:grid;gap:12px}
    .browser-card{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px 12px;
      background:linear-gradient(180deg,#fff,#fff7fb);
    }
    .browser-card h3{margin:.1rem 0 .4rem;font-size:1.05rem;font-weight:1000}
    .browser-card p{margin:.3rem 0 0;color:#444;line-height:1.7;font-weight:800}
    .browser-actions{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px;
    }
    .browser-actions .btn{padding:11px 14px;border-radius:14px}
    .browser-small{
      font-size:.82rem;
      color:#555;
      font-weight:900;
      line-height:1.6;
      margin-top:10px;
    }
    .browser-check{
      display:flex; gap:8px; align-items:center; margin-top:10px;
      font-weight:900; color:#333; font-size:.86rem;
    }
    .browser-toast{
      position:fixed; left:50%; bottom:18px;
      transform:translateX(-50%);
      background:rgba(17,17,17,.92);
      color:#fff;
      padding:10px 12px;
      border-radius:999px;
      box-shadow:0 14px 34px rgba(0,0,0,.25);
      font-weight:900;
      z-index:140;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s var(--ease), transform .18s var(--ease);
    }
    .browser-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-2px);
    }

    .skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
    .skip-link:focus{left:16px;top:12px;width:auto;height:auto;background:#111;color:#fff;padding:10px 12px;border-radius:10px;z-index:1000}
    :focus-visible{outline:2px solid #0b69d5;outline-offset:2px}

    @media (prefers-reduced-motion: reduce){
      *{scroll-behavior:auto !important;animation:none !important;transition:none !important}
    }
