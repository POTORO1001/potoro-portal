name: Check public site

on:
  workflow_dispatch:
  schedule:
    - cron: '15 19 * * *'

jobs:
  check-public-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check GitHub Pages
        run: node scripts/check-public-site.js
