<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>イベント | PO・TORO</title>
  <meta name="description" content="PO・TOROのイベント一覧" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#f6b7d2" />
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    #eventsGrid .card{position:relative}
    #eventsGrid .thumb{aspect-ratio:16/10;object-fit:cover}
    .event-overlay{
      position:absolute; left:12px; right:12px; bottom:12px;
      background:rgba(255,255,255,.90);
      border:1px solid rgba(255,255,255,.82);
      border-radius:16px;
      padding:10px 12px;
      box-shadow:0 14px 28px rgba(0,0,0,.14);
      display:flex; flex-direction:column; gap:6px;
    }
    .event-overlay .meta{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px; border-radius:999px;
      font-size:.78rem; font-weight:1000;
      background:linear-gradient(135deg, rgba(255,121,166,.18), rgba(127,201,255,.18));
      border:1px solid rgba(255,121,166,.18);
      color:#333;
      white-space:nowrap;
    }
    .pill.date{background:rgba(255,255,255,.9); border:1px solid #eee; color:#444}
    .event-title{font-weight:1000; font-size:1.05rem; margin:0}
    .featured{ grid-column: span 2; }
    @media (max-width:880px){ .featured{grid-column:auto} }

    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;padding:4vw;z-index:100;opacity:0;pointer-events:none;transition:.2s}
    .lightbox.open{opacity:1;pointer-events:auto}
    .lightbox img{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 8px 30px rgba(0,0,0,.5);border-radius:10px}
    .lightbox .close{position:absolute;top:16px;right:16px;background:#fff;border:none;border-radius:999px;font-size:16px;padding:8px 12px;cursor:pointer}
    @media (prefers-color-scheme: dark){
      .event-overlay{background:rgba(29,31,34,.92);border-color:rgba(255,255,255,.12)}
      .pill.date{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.14); color:#e8e8e8}
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">本文へスキップ</a>

  <header>
    <nav class="nav container" aria-label="Main">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true"><span>PT</span></div>
        <div class="brand-title">
          <div class="en">concept cafe <span style="letter-spacing:.12em">PO・TORO</span></div>
          <div class="jp">イベント</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html">トップ</a>
        <a href="news.html">お知らせ</a>
        <a href="goods.html">グッズ</a>
        <a href="games.html">ゲーム/診断</a>
      </div>
      <button class="hamburger" id="btnMenu" aria-label="メニューを開く" aria-controls="drawer" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </nav>

    <div class="drawer" id="drawer" aria-hidden="true" aria-label="サイドメニュー">
      <div class="head">
        <div style="font-weight:1000">メニュー</div>
        <button id="btnClose" aria-label="閉じる" style="background:#f6f6f6;border:none;border-radius:12px;padding:8px 10px;font-weight:1000;cursor:pointer">✕</button>
      </div>
      <a href="index.html">トップ</a>
      <a href="news.html">お知らせ</a>
      <a href="goods.html">グッズ</a>
      <a href="games.html">ゲーム/診断</a>
    </div>
  </header>

  <main id="main">
    <section>
      <div class="container reveal">
        <h1 class="sec-title">🎉 イベント一覧</h1>
        <div class="grid cols-3" id="eventsGrid"></div>
        <div class="mt-12">
          <a class="btn btn-ghost" href="index.html">← トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container foot reveal">
      <div>
        <h4>concept cafe PO・TORO</h4>
        <div class="copyright">© <span id="year"></span> PO・TORO / concept cafe. All rights reserved.</div>
      </div>
      <div></div><div></div>
    </div>
  </footer>

  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="画像ビューア">
    <button type="button" class="close" aria-label="閉じる (Esc)">閉じる ✕</button>
    <img id="lightboxImg" alt="拡大画像" />
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/core.js"></script>
  <script src="assets/js/events.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async ()=>{
      PortalCore.setupReveal();
      PortalCore.setupDrawer();
      PortalCore.setupCommonFooterYear();

      const items = await PortalEvents.loadEvents();
      PortalEvents.renderEventsGrid('eventsGrid', items);
      PortalEvents.setupLightbox();
    });
  </script>
</body>
</html>
